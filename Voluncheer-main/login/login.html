<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="stylelog.css" />
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <img src="../img/login/LOGO-05.png" alt="Logo Voluncheer">
    </div>

    <div id="login-section">
      <h2>Login</h2>

      <label for="login-email">Email</label>
      <input id="login-email" type="email" placeholder="nome@sobrenome.com" />

      <label for="login-senha">Senha</label>
      <input id="login-senha" type="password" placeholder="Senha" />

      <select id="login-tipo">
        <option value="voluntario">Voluntário</option>
        <option value="ong">ONG</option>
      </select>

      <button onclick="login()">Entrar</button>
      <p class="link" onclick="mostrarCadastro()">Não tem conta? Cadastre-se</p>
    </div>

    <div id="cadastro-section" style="display:none;">
      <h2>Cadastro</h2>

      <label for="cad-nome">Nome</label>
      <input id="cad-nome" type="text" placeholder="Nome" />

      <label for="cad-email">Email</label>
      <input id="cad-email" type="email" placeholder="Email" />

      <label for="cad-senha">Senha</label>
      <input id="cad-senha" type="password" placeholder="Senha" />

      <select id="cad-tipo">
        <option value="voluntario">Voluntário</option>
        <option value="ong">ONG</option>
      </select>

      <div id="extra-ong" style="display:none; margin-top:10px;">
        
        <label for="cnpj">CNPJ</label>
        <input id="cnpj" type="text" maxlength="18" placeholder="00.000.000/0000-00" />

        <label for="telefone">Telefone / WhatsApp</label>
        <input id="telefone" type="tel" placeholder="(99) 99999-9999" />

        <label for="cep">CEP</label>
        <input id="cep" type="text" placeholder="00000-000" maxlength="9" />
        
        <label for="rua">Rua</label>
        <input id="rua" type="text" disabled />
        
        <label for="bairro">Bairro</label>
        <input id="bairro" type="text" disabled />
        
        <label for="cidade">Cidade</label>
        <input id="cidade" type="text" disabled />
        
        <label for="estado">Estado</label>
        <input id="estado" type="text" disabled />        

        <label for="ong-area">Área de atuação</label>
        <input id="ong-area" type="text" placeholder="Área de atuação (ex.: Educação, Saúde)" />

        <label for="ong-site">Site oficial / Redes sociais</label>
        <input id="ong-site" type="url" placeholder="Site oficial ou Redes sociais (https://...)" />

        <label for="ong-desc">Descrição da ONG</label>
        <textarea id="ong-desc" placeholder="Descrição curta da ONG (missão ou objetivo)" cols="53" rows="5"></textarea>

        <label class="checkbox-label">
          Sou um representante autorizado da ONG
          <input id="ong-autorizado" type="checkbox" />
        </label>

        <label class="upload-label" style="display:block; margin-top:8px;">
          Documento de comprovação (estatuto, certificado):
          <input id="ong-doc" type="file" accept=".pdf,.jpg,.jpeg,.png" />
        </label>

        <label for="email-institucional">Email do representante</label>
        <input id="email-institucional" type="email" placeholder="Email institucional" />

      </div>

      <button onclick="cadastrar()">Cadastrar</button>
      <p class="link" onclick="mostrarLogin()">Já tem conta? Faça login</p>
    </div>

    <div id="dashboard" style="display:none;">
      <h2 id="dash-titulo"></h2>
      <button class="logout" onclick="window.location.href='../index.html'">Ir para Home</button>
    </div>

  </div>

<script>

  function mostrarCadastro() {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("cadastro-section").style.display = "block";
  }

  function mostrarLogin() {
    document.getElementById("cadastro-section").style.display = "none";
    document.getElementById("login-section").style.display = "block";
  }

  function abrirPainel(user) {
    document.getElementById("login-section").style.display = "none";
    document.getElementById("cadastro-section").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.getElementById("dash-titulo").innerText = `Olá, ${user.nome}! Você está logado como ${user.tipo}.`;
  }

  const selectCadTipo = document.getElementById("cad-tipo");
  const extraOng = document.getElementById("extra-ong");

  selectCadTipo.addEventListener("change", function() {
    extraOng.style.display = selectCadTipo.value === "ong" ? "block" : "none";
  });

  const cepInput = document.getElementById("cep");

  cepInput.addEventListener("blur", async function () {
    const cep = cepInput.value.replace(/\D/g, '');

    if(cep.length !== 8) {
      alert("CEP inválido");
      return;
    }

    try {
      const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const data = await response.json();

      if(data.erro){
        alert("CEP não encontrado!");
        return;
      }

      document.getElementById("rua").value = data.logradouro;
      document.getElementById("bairro").value = data.bairro;
      document.getElementById("cidade").value = data.localidade;
      document.getElementById("estado").value = data.uf;

    } catch {
      alert("Erro ao consultar CEP");
    }
  });

  async function cadastrar() {
    const nome = document.getElementById("cad-nome").value.trim();
    const email = document.getElementById("cad-email").value.trim();
    const senha = document.getElementById("cad-senha").value.trim();
    const tipo = document.getElementById("cad-tipo").value;

    let dadosExtras = {};
    if (tipo === "ong") {
      dadosExtras = {
        cnpj: document.getElementById("cnpj").value,
        telefone: document.getElementById("telefone").value,
        cep: document.getElementById("cep").value,
        area: document.getElementById("ong-area").value,
        site: document.getElementById("ong-site").value,
        descricao: document.getElementById("ong-desc").value
      };
    }

    if (!nome || !email || !senha) {
      alert("Preencha nome, email e senha!");
      return;
    }

    const novoUsuario = { nome, email, senha, tipo, ...dadosExtras };

    try {
      const response = await fetch('http://localhost:3000/cadastrar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(novoUsuario)
      });

      const dados = await response.json();
      alert(dados.message);
      if (response.ok) mostrarLogin();

    } catch (error) {
      alert("Erro ao conectar com o servidor.");
    }
  }

  async function login() {
    const email = document.getElementById("login-email").value.trim();
    const senha = document.getElementById("login-senha").value.trim();
    const tipo = document.getElementById("login-tipo").value;

    try {
      const response = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha, tipo })
      });

      const resultado = await response.json();

      if (response.ok) {
        localStorage.setItem("logado", JSON.stringify(resultado.user));
        abrirPainel(resultado.user);
      } else {
        alert(resultado.message);
      }
    } catch (error) {
      alert("Erro ao validar login.");
    }
  }

</script>

</body>
</html>
